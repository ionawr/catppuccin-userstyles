name: Sync Fork

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: sync-fork
  cancel-in-progress: true

jobs:
  sync:
    if: github.repository == 'ionawr/catppuccin-userstyles'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.USERSTYLES_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/catppuccin/userstyles.git
          git fetch upstream main

      - name: Rebase onto upstream
        id: rebase
        run: |
          set +e

          # check if there are upstream changes to rebase onto
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "already-up-to-date=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream."
            exit 0
          fi

          # attempt rebase
          git rebase upstream/main 2>/dev/null
          rebase_status=$?

          while [ $rebase_status -ne 0 ]; do
            # get list of conflicting files
            conflicting_files=$(git diff --name-only --diff-filter=U)

            # check if ALL conflicting files are catppuccin.user.less
            non_metadata_conflicts=""
            for file in $conflicting_files; do
              if [[ ! "$file" =~ catppuccin\.user\.less$ ]]; then
                if [ -z "$non_metadata_conflicts" ]; then
                  non_metadata_conflicts="$file"
                else
                  non_metadata_conflicts="$non_metadata_conflicts $file"
                fi
              fi
            done

            if [ -n "$non_metadata_conflicts" ]; then
              echo "conflict-files=$non_metadata_conflicts" >> "$GITHUB_OUTPUT"
              echo "has-non-metadata-conflicts=true" >> "$GITHUB_OUTPUT"
              git rebase --abort
              exit 0
            fi

            # resolve each conflicting catppuccin.user.less
            for file in $conflicting_files; do
              # take upstream's @version, keep ours for everything else
              # 1. get the upstream version of the @version line
              upstream_version=$(git show REBASE_HEAD:"$file" 2>/dev/null | grep -m1 '^@version ' || true)

              if [ -n "$upstream_version" ]; then
                # 2. use our version of the file as the base
                git checkout --ours "$file"
                # 3. replace the @version line with upstream's
                sed -i "s|^@version .*|${upstream_version}|" "$file"
              else
                # no @version in upstream's commit, just take ours
                git checkout --ours "$file"
              fi

              git add "$file"
            done

            # continue the rebase
            git rebase --continue 2>/dev/null
            rebase_status=$?
          done

          echo "rebase-success=true" >> "$GITHUB_OUTPUT"

      - name: Create PR for manual conflict resolution
        if: steps.rebase.outputs.has-non-metadata-conflicts == 'true'
        env:
          GH_TOKEN: ${{ secrets.USERSTYLES_TOKEN }}
          CONFLICT_FILES: ${{ steps.rebase.outputs.conflict-files }}
        run: |
          date_suffix=$(date +%Y-%m-%d)
          branch_name="sync/upstream-${date_suffix}"
          conflict_files="$CONFLICT_FILES"

          # create sync branch from current main
          git checkout -b "$branch_name"

          # attempt merge to show the diff (allow failure due to conflicts)
          git merge upstream/main --no-edit || true

          # stage everything including conflict markers
          git add -A
          git commit -m "chore: merge upstream (has conflicts)" --no-verify || true

          git push origin "$branch_name" --force

          # build PR body
          pr_body=$(cat <<'PREOF'
          ## Upstream Sync Manual Resolution Required

          The automated rebase encountered non-metadata conflicts that need manual resolution.

          ### Conflicting files
          PREOF
          )

          for file in $conflict_files; do
            pr_body="${pr_body}
          - \`${file}\`"
          done

          pr_body="${pr_body}

          ### How to resolve
          1. Check out this branch locally
          2. Resolve the conflicts
          3. Run the patching replacements (see sync workflow)
          4. Merge into \`main\`"

          # create or update PR
          repo="${{ github.repository }}"
          existing_pr=$(gh pr list --repo "$repo" --head "$branch_name" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --repo "$repo" --body "$pr_body"
          else
            gh pr create \
              --repo "$repo" \
              --title "sync: upstream changes need manual resolution (${date_suffix})" \
              --body "$pr_body" \
              --head "$branch_name" \
              --base main
          fi

      - name: Patch fork metadata
        if: steps.rebase.outputs.rebase-success == 'true'
        run: |
          UPSTREAM_ORG="catppuccin"
          UPSTREAM_REPO="userstyles"
          FORK_OWNER="ionawr"
          FORK_REPO="catppuccin-userstyles"

          UPSTREAM_PREFIX="github.com/${UPSTREAM_ORG}/${UPSTREAM_REPO}"
          FORK_PREFIX="github.com/${FORK_OWNER}/${FORK_REPO}"

          UPSTREAM_URL="https://${UPSTREAM_PREFIX}"
          FORK_URL="https://${FORK_PREFIX}"

          UPSTREAM_LIB="https://userstyles.catppuccin.com/lib/lib.less"
          FORK_LIB="https://raw.githubusercontent.com/${FORK_OWNER}/${FORK_REPO}/refs/heads/main/lib/lib.less"

          # patch all userstyle files
          find styles/*/catppuccin.user.less -type f | while read -r file; do
            sed -i \
              -e "s|${UPSTREAM_PREFIX}/styles/|${FORK_PREFIX}/styles/|g" \
              -e "s|${UPSTREAM_URL}/tree/main/styles/|${FORK_URL}/tree/main/styles/|g" \
              -e "s|${UPSTREAM_URL}/raw/main/styles/|${FORK_URL}/raw/main/styles/|g" \
              -e "s|${UPSTREAM_URL}/issues|${FORK_URL}/issues|g" \
              -e "s|${UPSTREAM_LIB}|${FORK_LIB}|g" \
              "$file"
          done

          # patch template
          sed -i \
            -e "s|${UPSTREAM_PREFIX}/styles/|${FORK_PREFIX}/styles/|g" \
            -e "s|${UPSTREAM_URL}/tree/main/styles/|${FORK_URL}/tree/main/styles/|g" \
            -e "s|${UPSTREAM_URL}/raw/main/styles/|${FORK_URL}/raw/main/styles/|g" \
            -e "s|${UPSTREAM_URL}/issues|${FORK_URL}/issues|g" \
            -e "s|${UPSTREAM_LIB}|${FORK_LIB}|g" \
            -e "s|${UPSTREAM_URL}/blob/|${FORK_URL}/blob/|g" \
            template/catppuccin.user.less

          # patch lint metadata script
          sed -i \
            -e "s|${UPSTREAM_URL}|${FORK_URL}|g" \
            -e "s|${UPSTREAM_PREFIX}/styles/|${FORK_PREFIX}/styles/|g" \
            scripts/lint/metadata.ts

          # patch README template
          sed -i \
            -e "s|${UPSTREAM_URL}/issues|${FORK_URL}/issues|g" \
            scripts/generate/templates/userstyle.md

          # commit if there are changes
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: patch fork metadata"
          fi

      - name: Force-push main
        if: steps.rebase.outputs.rebase-success == 'true'
        run: git push origin main --force

      - name: Update release tag
        if: steps.rebase.outputs.rebase-success == 'true'
        run: |
          git tag -f all-userstyles-export HEAD
          git push origin all-userstyles-export --force

      - name: Setup Deno
        if: steps.rebase.outputs.rebase-success == 'true'
        uses: nekowinston/setup-deno@main
        with:
          deno-version: v2.3.5

      - name: Generate Stylus import
        if: steps.rebase.outputs.rebase-success == 'true'
        run: deno task ci:stylus-import

      - name: Upload release artifact
        if: steps.rebase.outputs.rebase-success == 'true'
        run: gh release upload --clobber all-userstyles-export ./dist/import.json
        env:
          GH_TOKEN: ${{ secrets.USERSTYLES_TOKEN }}
